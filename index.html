<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corniche Palace | Your Private Villa Sanctuary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- PDF Generator Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-gold: #c5a880;
            --dark-gold: #aa8b5c;
            --bg-dark: #0f141c;
            --light-cream: #fbf9f6;
            --pure-white: #ffffff;
            --luxury-gray: #555555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfbfa; color: #333333; line-height: 1.6; }
        h1, h2, h3, h4, .hotel-title { font-family: 'Playfair Display', serif; letter-spacing: 1px; }

        nav { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0)); }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 60px; width: auto; border-radius: 50%; border: 2px solid var(--primary-gold); }
        .hotel-title { color: var(--primary-gold); font-size: 2rem; font-weight: 700; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { color: var(--pure-white); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
        
        .hero { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; overflow: hidden; }
        .video-background { position: absolute; min-width: 100%; min-height: 100%; z-index: -2; object-fit: cover; }
        .video-overlay { position: absolute; width: 100%; height: 100%; background: rgba(15, 20, 28, 0.55); z-index: -1; }
        
        section { padding: 80px 10%; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .btn-gold { padding: 15px 35px; background-color: var(--primary-gold); color: #000; text-decoration: none; text-transform: uppercase; font-weight: 600; cursor: pointer; }

        /* Booking Form */
        .booking-section { background-color: var(--light-cream); }
        .contact-wrapper { display: flex; gap: 50px; }
        .booking-form { flex: 1.2; display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group input, .form-group select, .form-group textarea { padding: 13px; border: 1px solid #dcd1c4; border-radius: 4px; }
        .booking-form button { background-color: #161c24; color: white; padding: 16px; border: none; cursor: pointer; }

        footer { background-color: #0b0e14; color: #666; text-align: center; padding: 30px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img src="14880.png.jpeg" alt="Logo" class="logo-img">
            <span class="hotel-title">Corniche Palace</span>
        </div>
        <ul class="nav-links">
            <li><a href="#book">Reserve Stay</a></li>
        </ul>
    </nav>

    <header class="hero">
        <video id="heroVideo" class="video-background" autoplay loop muted playsinline>
            <source src="hotel.mp4.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
        <div class="hero-content">
            <h2>WELCOME TO CORNICHE PALACE</h2>
            <a href="#book" class="btn-gold">Book Your Stay</a>
        </div>
    </header>

    <section id="book" class="booking-section">
        <div class="section-header"><h2>Secure Your Reservation</h2></div>
        <div class="contact-wrapper">
            <form id="bookingForm" class="booking-form" action="https://formspree.io/f/mwvjbqdj" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label>Select Suite Style</label>
                    <select id="room-type" name="room_type" onchange="updateGuestPriceDisplay()">
                        <option value="standard-double">Standard Double Room</option>
                        <option value="one-bedroom-suite">One Bedroom Suite</option>
                        <option value="two-bedroom-suite">Two Bedroom Suite</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Check-In Date</label>
                    <input type="date" name="checkin" required>
                </div>
                <div class="form-group">
                    <label>Check-Out Date</label>
                    <input type="date" name="checkout" required>
                </div>
                
                <!-- Hidden fields for Email/System -->
                <input type="hidden" name="booking_id" id="booking_id_input">
                <input type="hidden" name="total_price" id="total_price_input">
                
                <div class="form-group">
                    <label>Special Requests</label>
                    <textarea name="message" rows="3"></textarea>
                </div>

                <button type="submit" id="submitBtn">Submit & Download LPO</button>
            </form>

            <div class="contact-info">
                <h4>Direct Contact Helpline</h4>
                <p>Email: <strong>cornichepalace0@gmail.com</strong></p>
                <p>Phone: +971 55 677 0718</p>
            </div>
        </div>
    </section>

    <footer><p>© 2026 Corniche Palace Luxury Hotels & Resorts.</p></footer>

    <script>
        var currentHotelRates = { "standard-double": 350, "one-bedroom-suite": 750, "two-bedroom-suite": 1100 };

        document.getElementById("bookingForm").addEventListener("submit", function(e) {
            // Generate ID
            const bookingId = "CP-" + Math.floor(100000 + Math.random() * 900000);
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const room = document.getElementById("room-type").options[document.getElementById("room-type").selectedIndex].text;
            const price = currentHotelRates[document.getElementById("room-type").value];
            
            document.getElementById("booking_id_input").value = bookingId;
            document.getElementById("total_price_input").value = price;

            // LPO Layout
            const lpoContent = `
                <div style="padding:40px; border: 5px solid #c5a880; width: 80%; margin: auto;">
                    <h1 style="color:#c5a880; text-align:center;">CORNICHE PALACE</h1>
                    <h2 style="text-align:center;">Booking Confirmation LPO</h2>
                    <hr>
                    <p><strong>Booking ID:</strong> ${bookingId}</p>
                    <p><strong>Guest Name:</strong> ${name}</p>
                    <p><strong>Phone:</strong> ${phone}</p>
                    <p><strong>Room Category:</strong> ${room}</p>
                    <p><strong>Price per Night:</strong> AED ${price}</p>
                    <br>
                    <p>Thank you for choosing us!</p>
                </div>
            `;

            // Download PDF
            html2pdf().from(lpoContent).save('Booking_Confirmation_' + bookingId + '.pdf');
            
            alert("Success! Your Booking ID is " + bookingId + ". PDF is downloading.");
        });

        function updateGuestPriceDisplay() { /* Logic already handled by form values */ }
    </script>
</body>
</html>
