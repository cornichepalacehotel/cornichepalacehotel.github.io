<!-- මෙය ඔබගේ Booking Section එකෙහි අවසානයට හෝ අදාළ ස්ථානයේ තබන්න -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
    // Booking Form Submit කිරීමේදී LPO එක Generate කරන කොටස
    document.getElementById("bookingForm").addEventListener("submit", function(e) {
        // පෝරමය යැවීමට පෙර සුළු වේලාවක් ගනිමු
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const room = document.getElementById("room-type").options[document.getElementById("room-type").selectedIndex].text;
        const price = document.getElementById("guest-price-screen").innerText;
        const bookingId = "CP-" + Math.floor(100000 + Math.random() * 900000);
        
        document.getElementById("booking_id_input").value = bookingId;
        document.getElementById("total_price_input").value = price;

        // LPO එක නිර්මාණය කිරීම
        const lpoContent = `
            <div style="padding:40px; font-family: sans-serif; border: 2px solid #c5a880;">
                <h1 style="color: #c5a880;">Corniche Palace</h1>
                <h3>Booking Confirmation (LPO)</h3>
                <p><strong>Booking ID:</strong> ${bookingId}</p>
                <hr>
                <p><strong>Guest Name:</strong> ${name}</p>
                <p><strong>Phone:</strong> ${phone}</p>
                <p><strong>Room Category:</strong> ${room}</p>
                <p><strong>Price per Night:</strong> AED ${price}</p>
                <p><strong>Status:</strong> Confirmed</p>
                <br>
                <p>Thank you for choosing Corniche Palace!</p>
            </div>
        `;

        const opt = {
            margin: 1,
            filename: 'Booking_Confirmation_' + bookingId + '.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };

        // PDF එක සාදා Download කිරීමට සැලැස්වීම
        html2pdf().from(lpoContent).set(opt).save();

        alert("Reservation Successful! Your Booking ID is: " + bookingId + "\nDownload your confirmation PDF now.");
    });
</script>
