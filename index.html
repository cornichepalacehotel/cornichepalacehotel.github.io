<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corniche Palace | Your Private Villa Sanctuary</title>
    <!-- PDF Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* ඔබගේ මුල් CSS එලෙසම ඇත - වෙනස් කර නැත */
        :root { --primary-gold: #c5a880; --dark-gold: #aa8b5c; --bg-dark: #0f141c; --light-cream: #fbf9f6; --pure-white: #ffffff; --luxury-gray: #555555; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfbfa; color: #333333; line-height: 1.6; overflow-x: hidden; }
        h1, h2, h3, h4, .hotel-title { font-family: 'Playfair Display', serif; letter-spacing: 1px; }
        
        /* ... ඔබගේ මුල් CSS කොටස් සියල්ලම මෙහි පවතී ... */
        nav { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0)); }
        .logo-img { height: 60px; width: auto; border-radius: 50%; border: 2px solid var(--primary-gold); }
        .hotel-title { color: var(--primary-gold); font-size: 2rem; font-weight: 700; }
        .btn-gold { display: inline-block; padding: 15px 35px; background-color: var(--primary-gold); color: #000000; text-decoration: none; text-transform: uppercase; font-weight: 600; border-radius: 2px; }
        section { padding: 80px 10%; }
        .booking-section { background-color: var(--light-cream); }
        .booking-form { flex: 1.2; display: flex; flex-direction: column; gap: 20px; }
        .form-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .form-group input, .form-group select, .form-group textarea { padding: 13px; border: 1px solid #dcd1c4; border-radius: 4px; }
        .live-price-calculator { background: #fdfdfd; border: 1px dashed var(--primary-gold); padding: 15px; }
    </style>
</head>
<body>

    <!-- ඔබගේ ඉතිරි කොටස් (Nav, Hero, Sections) මෙහි එලෙසම තබන්න -->

    <section id="book" class="booking-section">
        <form id="bookingForm" class="booking-form" action="https://formspree.io/f/mwvjbqdj" method="POST">
            <!-- Hidden inputs -->
            <input type="hidden" name="booking_id" id="booking_id_input">
            <input type="hidden" name="total_price" id="total_price_input">
            <input type="hidden" name="_replyto" value="cornichepalace0@gmail.com">
            
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Select Suite Style</label>
                <select id="room-type" name="room_type" onchange="updateGuestPriceDisplay()">
                    <option value="standard-double">Standard Double Room</option>
                    <option value="one-bedroom-suite">One Bedroom Suite</option>
                    <option value="two-bedroom-suite">Two Bedroom Suite</option>
                </select>
            </div>

            <div class="live-price-calculator">
                <p>Current Room Category Daily Rate:</p>
                <div>AED <span id="guest-price-screen">...</span> / Night</div>
            </div>

            <button type="submit" id="submitBtn">Submit Reservation Request</button>
        </form>
    </section>

    <script>
        document.getElementById("bookingForm").addEventListener("submit", function(e) {
            const bookingId = "CP-" + Math.floor(100000 + Math.random() * 900000);
            document.getElementById("booking_id_input").value = bookingId;
            const price = document.getElementById("guest-price-screen").innerText;
            document.getElementById("total_price_input").value = price;

            // LPO සැකිල්ල
            const lpoHTML = `
                <div style="padding:50px; font-family: 'Arial', sans-serif; border: 5px solid #c5a880;">
                    <h1 style="color: #c5a880; text-align: center;">CORNICHE PALACE</h1>
                    <h2 style="text-align: center;">BOOKING CONFIRMATION</h2>
                    <hr style="margin: 20px 0;">
                    <p><strong>Booking ID:</strong> ${bookingId}</p>
                    <p><strong>Guest Name:</strong> ${document.getElementById('name').value}</p>
                    <p><strong>Phone:</strong> ${document.getElementById('phone').value}</p>
                    <p><strong>Room Type:</strong> ${document.getElementById('room-type').options[document.getElementById('room-type').selectedIndex].text}</p>
                    <p><strong>Price:</strong> AED ${price} per night</p>
                    <br><br>
                    <p>Thank you for choosing us. Please present this document upon arrival.</p>
                </div>
            `;

            // PDF ලෙස බාගත කිරීම
            const opt = {
                margin: 0.5,
                filename: 'Booking_Confirmation_' + bookingId + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            html2pdf().from(lpoHTML).set(opt).save();
        });
        
        // ඉතිරි JS කාර්යයන් (Rates update, etc) මෙතැනට දමන්න...
    </script>
</body>
</html>
