<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corniche Palace | Your Private Villa Sanctuary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- PDF Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* ඔබගේ මුල් CSS මෙහි එලෙසම පවතී */
        :root {
            --primary-gold: #c5a880;
            --dark-gold: #aa8b5c;
            --bg-dark: #0f141c;
            --light-cream: #fbf9f6;
            --pure-white: #ffffff;
            --luxury-gray: #555555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfbfa; color: #333333; line-height: 1.6; overflow-x: hidden; }
        h1, h2, h3, h4, .hotel-title { font-family: 'Playfair Display', serif; letter-spacing: 1px; }
        
        nav { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0)); }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 60px; width: auto; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-gold); }
        .hotel-title { color: var(--primary-gold); font-size: 2rem; font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { color: var(--pure-white); text-decoration: none; font-weight: 400; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary-gold); }

        .hero { position: relative; height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--pure-white); overflow: hidden; }
        .video-background { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; z-index: -2; transform: translate(-50%, -50%); object-fit: cover; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 20, 28, 0.55); z-index: -1; }
        .hero-content h2 { font-size: 3.5rem; font-weight: 700; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.6); text-transform: uppercase; }
        .hero-content p { font-size: 1.1rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; color: var(--primary-gold); }
        .btn-gold { display: inline-block; padding: 15px 35px; background-color: var(--primary-gold); color: #000000; text-decoration: none; text-transform: uppercase; font-weight: 600; letter-spacing: 2px; font-size: 0.85rem; border-radius: 2px; transition: all 0.3s; border: 1px solid var(--primary-gold); }
        .btn-gold:hover { background-color: transparent; color: var(--primary-gold); box-shadow: 0 0 15px rgba(197, 168, 128, 0.4); }

        section { padding: 80px 10%; }
        .section-header { text-align: center; margin-bottom: 60px; }
        .section-header h2 { font-size: 2.8rem; color: #1a1a1a; position: relative; display: inline-block; padding-bottom: 15px; }
        .section-header h2::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 2px; background-color: var(--primary-gold); }

        .about-container { display: flex; gap: 50px; align-items: center; }
        .about-text { flex: 1; }
        .about-text p { margin-bottom: 20px; color: var(--luxury-gray); font-size: 1.05rem; }
        .about-image-wrapper { flex: 1; }
        .about-gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .about-gallery-grid img { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: transform 0.3s; }
        .about-gallery-grid img:hover { transform: scale(1.03); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background-color: var(--pure-white); border-radius: 4px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-10px); }
        .card-img { width: 100%; height: 250px; object-fit: cover; }
        .card-content { padding: 25px; }
        .room-price-tag { color: var(--dark-gold); font-weight: 600; font-size: 1.1rem; margin-bottom: 15px; }

        .amenities-section { background-color: var(--pure-white); }
        .amenities-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; }
        .amenity-card { background: #ffffff; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid #f1ece5; }
        .amenity-img { width: 100%; height: 180px; object-fit: cover; }
        .amenity-text-box { padding: 20px; border-top: 3px solid var(--primary-gold); }

        .booking-section { background-color: var(--light-cream); color: #1a1a1a; border-top: 1px solid #eee4d6; }
        .contact-wrapper { display: flex; gap: 50px; }
        .booking-form { flex: 1.2; display: flex; flex-direction: column; gap: 20px; }
        .form-row { display: flex; gap: 20px; }
        .form-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--dark-gold); font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select { padding: 13px; background-color: var(--pure-white); border: 1px solid #dcd1c4; color: #222222; border-radius: 4px; outline: none; font-size: 0.95rem; }
        .live-price-calculator { background: #fdfdfd; border: 1px dashed var(--primary-gold); padding: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
        .live-price-calculator span { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--dark-gold); font-weight: 700; }
        .booking-form button { background-color: #161c24; color: var(--pure-white); padding: 16px; border: none; text-transform: uppercase; font-weight: 600; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; border-radius: 2px; }
        .booking-form button:hover { background-color: var(--dark-gold); }
        .contact-info { flex: 0.8; display: flex; flex-direction: column; gap: 30px; }
        
        footer { background-color: #0b0e14; color: #666666; text-align: center; padding: 30px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img src="14880.png.jpeg" alt="Corniche Palace Logo" class="logo-img">
            <span class="hotel-title">Corniche Palace</span>
        </div>
        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#rooms">Rooms & Rates</a></li>
            <li><a href="#amenities">Amenities</a></li>
            <li><a href="#book">Reserve Stay</a></li>
        </ul>
    </nav>

    <header class="hero">
        <video id="heroVideo" class="video-background" autoplay loop muted playsinline>
            <source src="hotel.mp4.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
        <div class="hero-content">
            <h2>WELCOME TO CORNICHE PALACE</h2>
            <p>A Timeless Retreat on the Arabian Gulf</p>
            <a href="#book" class="btn-gold">Book Your Stay</a>
        </div>
    </header>

    <!-- (Other Sections: About, Rooms, Amenities...) -->
    <!-- Note: Shortened for brevity in output, but all sections remain in your structure -->

    <section id="book" class="booking-section">
        <div class="section-header"><h2>Secure Your Reservation</h2></div>
        <div class="contact-wrapper">
            <form id="bookingForm" class="booking-form" action="https://formspree.io/f/mwvjbqdj" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required placeholder="+971 50 000 0000">
                    </div>
                </div>
                <div class="form-group">
                    <label for="room-type">Select Suite Style</label>
                    <select id="room-type" name="room_type" onchange="updateGuestPriceDisplay()">
                        <option value="standard-double">Standard Double Room</option>
                        <option value="one-bedroom-suite">One Bedroom Suite</option>
                        <option value="two-bedroom-suite">Two Bedroom Suite</option>
                    </select>
                </div>
                <input type="hidden" name="booking_id" id="booking_id_input">
                <input type="hidden" name="total_price" id="total_price_input">
                <div class="live-price-calculator">
                    <p>Current Room Category Daily Rate:</p>
                    <div>AED <span id="guest-price-screen">...</span> / Night</div>
                </div>
                <button type="submit" id="submitBtn">Submit Reservation Request</button>
            </form>
        </div>
    </section>

    <script>
        var currentHotelRates = { "standard-double": 350, "one-bedroom-suite": 750, "two-bedroom-suite": 1100 };

        document.getElementById("bookingForm").addEventListener("submit", function(e) {
            // Generate Booking ID
            const bookingId = "CP-" + Math.floor(100000 + Math.random() * 900000);
            document.getElementById("booking_id_input").value = bookingId;
            
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const room = document.getElementById("room-type").options[document.getElementById("room-type").selectedIndex].text;
            const price = document.getElementById("guest-price-screen").innerText;
            
            document.getElementById("total_price_input").value = price;

            // LPO Content
            const lpoContent = `
                <div style="padding:40px; font-family: sans-serif; border: 2px solid #c5a880;">
                    <h1 style="color: #c5a880;">Corniche Palace</h1>
                    <h3>Booking Confirmation (LPO)</h3>
                    <p><strong>Booking ID:</strong> ${bookingId}</p>
                    <hr>
                    <p><strong>Guest Name:</strong> ${name}</p>
                    <p><strong>Phone:</strong> ${phone}</p>
                    <p><strong>Room Category:</strong> ${room}</p>
                    <p><strong>Price per Night:</strong> AED ${price}</p>
                    <p><strong>Status:</strong> Confirmed</p>
                    <br>
                    <p>Thank you for choosing Corniche Palace!</p>
                </div>
            `;

            const opt = {
                margin: 1,
                filename: 'Booking_Confirmation_' + bookingId + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Generate and Save PDF
            html2pdf().from(lpoContent).set(opt).save();
        });

        function updateGuestPriceDisplay() {
            var selectedStyle = document.getElementById("room-type").value;
            document.getElementById("guest-price-screen").innerText = currentHotelRates[selectedStyle];
        }
    </script>
</body>
</html>
